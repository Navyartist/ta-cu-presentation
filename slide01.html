<!DOCTYPE html>

<html data-theme="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, height=720, initial-scale=1.0" name="viewport"/>
<title>타슈 탄소중립 앱 발표자료</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Do+Hyeon&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background-color: #f8fcf9;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .slide-container {
            position: relative;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background-image: url("https://www.genspark.ai/api/files/s/IHVz8Bf8");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- 배경 오버레이 (Shape) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0px; top: 0px; width: 1280px; height: 720px; background-color: rgba(14, 56, 30, 0.75); z-index: 1;"></div>
<!-- 로고/뱃지 영역 -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 50px; top: 40px; width: 300px; height: 40px; z-index: 10;">
<p style="margin: 0; font-size: 20px; color: #ffffff; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
<i class="fas fa-leaf" style="color: #2ecc71; margin-right: 8px;"></i> TA-CU
            </p>
</div>
<div data-object="true" data-object-type="textbox" style="position: absolute; right: 50px; top: 40px; width: 200px; height: 40px; z-index: 10; text-align: right;">
<p style="margin: 0; font-size: 16px; color: rgba(255, 255, 255, 0.8); font-weight: 400;">
                ver 1.0 Final
            </p>
</div>
<!-- 프로젝트 타이틀 -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 100px; top: 200px; width: 1080px; height: 220px; z-index: 10; text-align: center;">
<p style="margin: 0; font-family: 'Do Hyeon', sans-serif; font-size: 84px; line-height: 1.1; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                대전 지역특화 탄소 중립<br/>
<span style="color: #2ecc71;">타슈 연동 플랫폼</span> 개발 결과
            </p>
</div>
<!-- 프로젝트 기간 및 소개 -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 140px; top: 430px; width: 1000px; height: 60px; z-index: 10; text-align: center;">
<p style="margin: 0; font-size: 24px; color: #dcdcdc; font-weight: 400; letter-spacing: 0.5px;">
                2026.03.13 ~ 03.27 (2주) | 타슈 이용 데이터를 탄소 절감과 보상에 연결한 지역특화 플랫폼
            </p>
</div>
<!-- 팀 정보 구분선 -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 440px; top: 510px; width: 400px; height: 2px; background-color: rgba(255, 255, 255, 0.3); z-index: 5;"></div>
<!-- 팀 구성 -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 340px; top: 530px; width: 600px; height: 50px; z-index: 10; text-align: center;">
<p style="margin: 0; font-size: 22px; color: #ffffff; font-weight: 700;">
<i class="fas fa-users" style="margin-right: 10px; color: #2ecc71;"></i> 팀 구성: 3인 프로젝트
            </p>
</div>
<!-- 발표 순서 카드 배경 -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 150px; top: 600px; width: 980px; height: 80px; background-color: rgba(255, 255, 255, 0.1); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 5;"></div>
<!-- 발표자 A -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 200px; top: 625px; width: 30px; height: 40px; font-size: 24px; color: #2ecc71; z-index: 10; text-align: center;">
<i class="fas fa-lightbulb"></i>
</div>
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 240px; top: 615px; width: 220px; height: 60px; z-index: 10;">
<p style="margin: 0; font-size: 16px; color: #aaaaaa; font-weight: 500; margin-bottom: 2px;">발표자 A</p>
<p style="margin: 0; font-size: 19px; color: #ffffff; font-weight: 700;">기획 및 전략</p>
</div>
<!-- 화살표 1 -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 450px; top: 628px; width: 20px; height: 30px; font-size: 20px; color: rgba(255, 255, 255, 0.5); z-index: 10; text-align: center;">
<i class="fas fa-chevron-right"></i>
</div>
<!-- 발표자 B -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 510px; top: 625px; width: 30px; height: 40px; font-size: 24px; color: #3498db; z-index: 10; text-align: center;">
<i class="fas fa-code"></i>
</div>
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 550px; top: 615px; width: 220px; height: 60px; z-index: 10;">
<p style="margin: 0; font-size: 16px; color: #aaaaaa; font-weight: 500; margin-bottom: 2px;">발표자 B</p>
<p style="margin: 0; font-size: 19px; color: #ffffff; font-weight: 700;">기능 및 기술</p>
</div>
<!-- 화살표 2 -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 760px; top: 628px; width: 20px; height: 30px; font-size: 20px; color: rgba(255, 255, 255, 0.5); z-index: 10; text-align: center;">
<i class="fas fa-chevron-right"></i>
</div>
<!-- 발표자 C -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 820px; top: 625px; width: 30px; height: 40px; font-size: 24px; color: #e74c3c; z-index: 10; text-align: center;">
<i class="fas fa-bug"></i>
</div>
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 860px; top: 615px; width: 220px; height: 60px; z-index: 10;">
<p style="margin: 0; font-size: 16px; color: #aaaaaa; font-weight: 500; margin-bottom: 2px;">발표자 C</p>
<p style="margin: 0; font-size: 19px; color: #ffffff; font-weight: 700;">트러블슈팅 및 회고</p>
</div>
</div>
</body>
</html>
