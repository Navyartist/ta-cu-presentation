<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA-CU Presentation Viewer</title>
  <style>
    :root {
      --slide-width: 1280;
      --slide-height: 720;
      --slide-scale: 1;
      --ui-bg: rgba(15, 23, 42, 0.7);
      --ui-border: rgba(255, 255, 255, 0.18);
      --ui-text: #f8fafc;
      --ui-muted: rgba(248, 250, 252, 0.72);
      --accent: #34d399;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --button-size: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(52, 211, 153, 0.16), transparent 30%),
        radial-gradient(circle at bottom, rgba(56, 189, 248, 0.12), transparent 28%),
        #020617;
      color: var(--ui-text);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
    }

    body {
      position: relative;
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .viewer::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.14;
      pointer-events: none;
    }

    .stage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--slide-width) * 1px);
      height: calc(var(--slide-height) * 1px);
      transform: translate(-50%, -50%) scale(var(--slide-scale));
      transform-origin: center center;
      box-shadow: var(--shadow);
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
    }

    .stage-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
      pointer-events: none;
    }

    .chrome {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .toolbar {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      background: var(--ui-bg);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      pointer-events: auto;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 180ms ease,
        visibility 180ms ease,
        transform 180ms ease;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 180px;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 12px;
      color: var(--ui-muted);
    }

    .counter {
      min-width: 68px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-button,
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(15, 23, 42, 0.84);
      color: var(--ui-text);
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, opacity 160ms ease;
    }

    .nav-button:hover,
    .action-button:hover {
      transform: translateY(-1px);
      background: rgba(30, 41, 59, 0.92);
    }

    .nav-button:active,
    .action-button:active {
      transform: translateY(0);
    }

    .nav-button:disabled,
    .action-button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .action-button {
      height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      gap: 8px;
    }

    .side-nav {
      position: absolute;
      top: 50%;
      width: 100%;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 24px;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 180ms ease,
        visibility 180ms ease;
    }

    .nav-button {
      width: var(--button-size);
      height: var(--button-size);
      border-radius: 50%;
      pointer-events: auto;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .icon {
      width: 22px;
      height: 22px;
      display: block;
    }

    .icon path,
    .icon polyline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .footer {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--ui-border);
      color: var(--ui-muted);
      font-size: 12px;
      backdrop-filter: blur(18px);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 180ms ease,
        visibility 180ms ease,
        transform 180ms ease;
    }

    .viewer[data-show-toolbar="true"] .toolbar {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .viewer[data-show-nav="true"] .side-nav {
      opacity: 1;
      visibility: visible;
    }

    .viewer[data-show-footer="true"] .footer {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 768px) {
      :root {
        --button-size: 54px;
      }

      .toolbar {
        width: calc(100vw - 24px);
        justify-content: space-between;
        padding: 10px 12px;
      }

      .title-block {
        min-width: 0;
      }

      .subtitle {
        display: none;
      }

      .side-nav {
        padding: 0 12px;
      }

      .footer {
        bottom: 14px;
        width: calc(100vw - 24px);
        text-align: center;
      }
    }

    @media (hover: none) {
      .toolbar,
      .side-nav,
      .footer {
        opacity: 1;
        visibility: visible;
      }
    }
  </style>
</head>
<body>
  <main class="viewer" id="viewer">
    <div class="stage" id="stage">
      <iframe
        id="slideFrame"
        class="stage-frame"
        title="Presentation Slide"
        loading="eager"
      ></iframe>
    </div>

    <div class="chrome">
      <div class="toolbar" role="toolbar" aria-label="Presentation controls">
        <div class="title-block">
          <div class="title">TA-CU Presentation</div>
          <div class="subtitle">Arrow keys to navigate, F to toggle fullscreen</div>
        </div>

        <div class="counter" id="slideCounter">1 / 10</div>

        <div class="toolbar-actions">
          <button type="button" class="action-button" id="fullscreenButton" aria-label="Toggle fullscreen">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5"></path>
              <path d="M16 3h5v5"></path>
              <path d="M21 16v5h-5"></path>
              <path d="M3 16v5h5"></path>
            </svg>
            <span id="fullscreenLabel">Fullscreen</span>
          </button>
        </div>
      </div>

      <div class="side-nav" aria-hidden="false">
        <button type="button" class="nav-button" id="prevButton" aria-label="Previous slide">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>

        <button type="button" class="nav-button" id="nextButton" aria-label="Next slide">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <div class="footer" id="footerHint">Esc exits fullscreen</div>
    </div>
  </main>

  <script>
    const slides = [
      "slide01.html",
      "slide02.html",
      "slide03.html",
      "slide04.html",
      "slide05.html",
      "slide06.html",
      "slide07.html",
      "slide08.html",
      "slide09.html",
      "slide10.html"
    ];

    const slideWidth = 1280;
    const slideHeight = 720;
    const viewer = document.getElementById("viewer");
    const frame = document.getElementById("slideFrame");
    const counter = document.getElementById("slideCounter");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const fullscreenButton = document.getElementById("fullscreenButton");
    const fullscreenLabel = document.getElementById("fullscreenLabel");
    const footerHint = document.getElementById("footerHint");
    const wheelNavigationThreshold = 24;
    const wheelNavigationCooldown = 420;

    let currentIndex = getInitialIndex();
    let lastWheelNavigationAt = 0;

    function updateUiVisibility(event) {
      if (window.matchMedia("(hover: none)").matches) {
        viewer.dataset.showToolbar = "true";
        viewer.dataset.showNav = "true";
        viewer.dataset.showFooter = "true";
        return;
      }

      const bounds = viewer.getBoundingClientRect();
      const x = event.clientX - bounds.left;
      const y = event.clientY - bounds.top;
      const topZoneHeight = Math.min(96, bounds.height * 0.14);
      const sideZoneWidth = Math.min(120, bounds.width * 0.12);
      const sideZoneTop = bounds.height * 0.29;
      const sideZoneBottom = bounds.height * 0.71;
      const nearTop = y >= 0 && y <= topZoneHeight;
      const inVerticalBand = y >= sideZoneTop && y <= sideZoneBottom;
      const nearLeft = x >= 0 && x <= sideZoneWidth && inVerticalBand;
      const nearRight = x >= bounds.width - sideZoneWidth && x <= bounds.width && inVerticalBand;
      const showNav = nearLeft || nearRight;
      const showAny = nearTop || showNav;

      viewer.dataset.showToolbar = nearTop ? "true" : "false";
      viewer.dataset.showNav = showNav ? "true" : "false";
      viewer.dataset.showFooter = showAny ? "true" : "false";
    }

    function clearUiVisibility() {
      if (window.matchMedia("(hover: none)").matches) {
        viewer.dataset.showToolbar = "true";
        viewer.dataset.showNav = "true";
        viewer.dataset.showFooter = "true";
        return;
      }

      viewer.dataset.showToolbar = "false";
      viewer.dataset.showNav = "false";
      viewer.dataset.showFooter = "false";
    }

    function getInitialIndex() {
      const match = window.location.hash.match(/slide=(\d+)/i);
      if (!match) {
        return 0;
      }

      const parsed = Number.parseInt(match[1], 10) - 1;
      if (Number.isNaN(parsed)) {
        return 0;
      }

      return clampIndex(parsed);
    }

    function clampIndex(index) {
      return Math.min(Math.max(index, 0), slides.length - 1);
    }

    function updateScale() {
      const scale = Math.min(window.innerWidth / slideWidth, window.innerHeight / slideHeight);
      document.documentElement.style.setProperty("--slide-scale", String(scale));
    }

    function syncHash() {
      const nextHash = "#slide=" + String(currentIndex + 1);
      if (window.location.hash !== nextHash) {
        try {
          history.replaceState(null, "", nextHash);
        } catch (error) {
          window.location.hash = nextHash;
        }
      }
    }

    function updateControls() {
      counter.textContent = String(currentIndex + 1) + " / " + String(slides.length);
      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === slides.length - 1;

      const isFullscreen = Boolean(document.fullscreenElement);
      fullscreenLabel.textContent = isFullscreen ? "Exit fullscreen" : "Fullscreen";
      footerHint.textContent = isFullscreen
        ? "Use Space or wheel to navigate, Esc to leave fullscreen"
        : "Use click, arrows, Space, wheel, or F";
    }

    function loadSlide(index) {
      currentIndex = clampIndex(index);
      frame.src = slides[currentIndex];
      syncHash();
      updateControls();
    }

    function goToPrevious() {
      if (currentIndex > 0) {
        loadSlide(currentIndex - 1);
      }
    }

    function goToNext() {
      if (currentIndex < slides.length - 1) {
        loadSlide(currentIndex + 1);
      }
    }

    async function toggleFullscreen() {
      if (document.fullscreenElement) {
        if (document.exitFullscreen) {
          await document.exitFullscreen();
        }
        return;
      }

      const viewer = document.getElementById("viewer");
      if (viewer.requestFullscreen) {
        await viewer.requestFullscreen();
      }
    }

    function handleKeydown(event) {
      if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey) {
        return;
      }

      switch (event.key) {
        case "ArrowLeft":
          event.preventDefault();
          goToPrevious();
          break;
        case "ArrowRight":
          event.preventDefault();
          goToNext();
          break;
        case " ":
        case "Spacebar":
          event.preventDefault();
          goToNext();
          break;
        case "Home":
          event.preventDefault();
          loadSlide(0);
          break;
        case "End":
          event.preventDefault();
          loadSlide(slides.length - 1);
          break;
        case "f":
        case "F":
          event.preventDefault();
          toggleFullscreen().catch(() => {});
          break;
        default:
          break;
      }
    }

    function handleWheel(event) {
      if (event.defaultPrevented || event.ctrlKey) {
        return;
      }

      const dominantDelta = Math.abs(event.deltaY) >= Math.abs(event.deltaX)
        ? event.deltaY
        : event.deltaX;

      if (Math.abs(dominantDelta) < wheelNavigationThreshold) {
        return;
      }

      const now = Date.now();
      if (now - lastWheelNavigationAt < wheelNavigationCooldown) {
        event.preventDefault();
        return;
      }

      lastWheelNavigationAt = now;
      event.preventDefault();

      if (dominantDelta > 0) {
        goToNext();
        return;
      }

      goToPrevious();
    }

    function handleHashChange() {
      const nextIndex = getInitialIndex();
      if (nextIndex !== currentIndex) {
        loadSlide(nextIndex);
      }
    }

    prevButton.addEventListener("click", goToPrevious);
    nextButton.addEventListener("click", goToNext);
    fullscreenButton.addEventListener("click", () => {
      toggleFullscreen().catch(() => {});
    });

    viewer.addEventListener("mousemove", updateUiVisibility);
    viewer.addEventListener("mouseleave", clearUiVisibility);
    viewer.addEventListener("wheel", handleWheel, { passive: false });
    window.addEventListener("resize", updateScale);
    window.addEventListener("keydown", handleKeydown);
    window.addEventListener("hashchange", handleHashChange);
    document.addEventListener("fullscreenchange", () => {
      updateScale();
      updateControls();
    });

    updateScale();
    clearUiVisibility();
    loadSlide(currentIndex);
  </script>
</body>
</html>
